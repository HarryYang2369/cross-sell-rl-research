# =============================================================================
# Cross-sell RL configuration — the single source of truth.
#
# Every key shown here has the same default in code, so a config file that
# only overrides the keys you care about is valid (even an empty file works).
# =============================================================================

data:
  # Where customer data comes from:
  #   synthetic  -> generate fake customers matching the schema below
  #   csv        -> read `path` with pandas (e.g. a Databricks export)
  #   parquet    -> read `path` with pandas (e.g. a Databricks export)
  #   databricks -> direct connection (scaffolded; needs credentials, see README)
  source: synthetic
  path: null
  databricks:
    catalog: null
    schema: null
    table: null

  # Column mapping — edit these to match your real tables; nothing about
  # column names is hardcoded anywhere else. The synthetic generator produces
  # exactly this shape, so switching `source` later needs no code changes.
  schema:
    customer_id: customer_id
    numeric_features: [age, tenure_years, annual_premium, num_claims, credit_score]
    categorical_features: [region, acquisition_channel]
    # For each product in products.catalog there must be a 0/1 column named
    # "<owned_product_prefix><product>" (e.g. has_home) marking ownership.
    owned_product_prefix: has_

products:
  # The action space: one action per product the agent can offer.
  # A customer is never offered a product they already own.
  catalog: [home, life, health, travel, pet]
  # Annual premium per product (used when reward.type is "revenue").
  premiums:
    home: 950.0
    life: 620.0
    health: 1400.0
    travel: 180.0
    pet: 320.0

reward:
  # conversion -> reward is 1 if the offered product is bought, else 0
  # revenue    -> reward is the product premium if bought, else 0
  type: conversion

synthetic:
  # Only used when data.source is "synthetic".
  n_customers: 5000
  seed: 7

environment:
  # The simulated customer-response model (the hidden ground truth agents must
  # learn). Until real outcome logs are wired in, conversions are always
  # simulated — even when customer features come from a real csv/parquet file.
  base_conversion_rate: 0.06   # typical probability that an offer converts
  context_influence: 1.4       # how strongly customer features shift that probability
  seed: 2026

experiment:
  n_rounds: 30000              # simulated offer decisions per agent
  seed: 42
  output_dir: results
  # Agents to compare; keys are registry names, values are hyperparameters.
  agents:
    random: {}                      # baseline: uniform over eligible products
    epsilon_greedy: {epsilon: 0.1}  # context-free baseline (no personalization)
    linucb: {alpha: 1.0}            # contextual UCB (Li et al. 2010)
    lin_ts: {scale: 0.3}            # linear Thompson sampling (small scale suits 0/1 rewards)
