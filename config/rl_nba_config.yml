# =============================================================================
# Cross-sell RL configuration — the single source of truth.
#
# Column names below mirror the real Databricks columns (normalized to
# snake_case). While data.source is "synthetic" every column is generated with
# a plausible distribution; when a real export lands, switch source to
# csv/parquet and rename any column here to its exact production name
# (e.g. wealth_segment -> "Tag-Final").
#
# Every key is optional and falls back to an in-code default, so you only need
# to spell out what you want to override. The five design considerations map
# onto config sections as:
#   1. State space    -> state.feature_groups (+ state.delivery switch)
#   2. Action space   -> products.catalog
#   3. Reward         -> reward.type: conversion | ape | vnb
#   4. Temporal       -> state.trends (short-window vs long-window ratios)
#   5. Coverage gaps  -> state.coverage_gaps (holdings vs segment-typical portfolio)
#
# The `agent:` block picks the model to train (or `type: all` for every model).
# With `type: all` the run compares, on identical customer sequences:
#   random   -> the floor (uniform over eligible products)
#   linucb   -> linear contextual bandit
#   rff_ucb  -> non-linear (kernel) contextual bandit
#
# A simpler flat schema is also supported for quick experiments: drop the
# `state:` block and instead list data.schema.numeric_features /
# categorical_features directly. See config.py for that alternative.
# =============================================================================

data:
  source: synthetic            # switch to csv/parquet + path for a real export
  path: null
  schema:
    customer_id: customer_id
    owned_product_prefix: has_ # expects 0/1 columns has_accident, has_medical, ...
    # numeric/categorical lists are assembled from state.feature_groups below.

state:
  # Who delivers the offer: assigned_agent | mixed | direct.
  # assigned_agent/mixed -> the servicing agent's quality enters the state
  # (agent_context group); direct -> it is excluded automatically.
  delivery: mixed

  feature_groups:
    profile:
      numeric: [customer_age]
      # customer_gender is compliance-sensitive in some jurisdictions:
      # delete it from this list to excise it from the model entirely.
      categorical: [customer_gender, customer_marital_status, customer_income_range,
                    wealth_segment]   # wealth_segment maps to "Tag-Final"
    holdings:
      numeric: [customer_holdings_count, customer_holdings_ap,
                customer_holdings_sum_assured, customer_inforce_policy_holding_ap,
                customer_all_policy_holding_count]
    behaviour:
      numeric: [customer_purchase_count_past_1m, customer_purchase_count_past_3m,
                customer_purchase_count_past_6m, customer_purchase_count_past_12m,
                customer_purchased_ap_past_12m,
                customer_lapsed_policy_count_past_12m,
                customer_surrender_policy_count_past_12m]
    channel:
      numeric: [tied_agency_customer, bancassured_customer, brokers_customer]
    engagement:
      categorical: [voc_purchase, voc_service, voc_claim]
    value_segment:
      numeric: [customer_inforce_private_bmu_count, customer_inforce_maxfocus_bmu_count,
                customer_inforced_wealthicon_value_usd]
    agent_context:                       # follows state.delivery unless enabled is set
      numeric: [agent_sales_count_past_12m, agent_sales_ap_past_12m,
                agent_avg_sales_policy_count_past_12m, agent_policy_13m_lapse_rate,
                agent_repurchase_count_past_6m]
      categorical: [mdrt_label]

  # 4. Temporal: is recent purchase pace above or below the customer's yearly pace?
  trends:
    - {short: customer_purchase_count_past_1m, long: customer_purchase_count_past_6m}
    - {short: customer_purchase_count_past_3m, long: customer_purchase_count_past_12m}

  # 5. Coverage gaps: which products do similar customers (same wealth segment
  # and income band) typically hold that this customer does not?
  coverage_gaps:
    segment_by: [wealth_segment, customer_income_range]

products:
  # 2. Action space: one recommendation per product category. Non-exhaustive;
  # extend freely — has_<category> columns and value tables follow along.
  catalog: [accident, medical, saving, term_life, whole_life, investment, annuity]

  # PLACEHOLDER value tables in HKD — replace with actuarial figures.
  # ape: typical annual-premium-equivalent of a new policy in the category.
  ape:
    accident: 3000
    medical: 9000
    saving: 60000
    term_life: 7000
    whole_life: 45000
    investment: 80000
    annuity: 55000
  # vnb: value of new business (profit margin view; protection-heavy products
  # carry more VNB per premium dollar than savings/investment).
  vnb:
    accident: 1800
    medical: 4500
    saving: 9000
    term_life: 4200
    whole_life: 22500
    investment: 8000
    annuity: 16500

reward:
  # 3. Reward: conversion (1 per sale) | ape (premium volume) | vnb (economic value).
  type: vnb

synthetic:
  n_customers: 6000
  seed: 7

environment:
  base_conversion_rate: 0.05
  context_influence: 1.4
  seed: 2026
  # How strongly journey stage drives behaviour in the simulated world, as a
  # multiple of the base per-feature weight. 1.0 = journey is redundant (our
  # honest finding). Higher simulates a world where journey genuinely matters —
  # then journey features help linear models and non-linear models recover the
  # effect from raw features. Only active when dtoc.enabled adds the journey block.
  journey_influence: 8.0

# The model to train.
agent:
  type: all         # random | linucb | rff_ucb | all   (all = run every model type)
  alpha: 1.0        # exploration strength (linucb / rff_ucb; ignored by random)
  journey: true     # use the Digital-Twin journey features (needs dtoc.enabled to take effect)
  n_features: 256   # RFF random features — REQUIRED for rff_ucb and for 'all'; ignored otherwise
  # To compare with vs without journey, run twice: journey: true, then journey: false.

experiment:
  n_rounds: 30000
  seed: 42
  output_dir: rl_nba/results   # relative to the monorepo root (where you run from)

# Digital Twin of Customer (DToC) layer.
dtoc:
  # true  -> fold the journey model into the STATE (models train on life_stage +
  #          relationship_stage) AND make the twin layer available (scenario / viz / explain).
  #          Compare with vs without by running agent.journey: true then false.
  # false -> plain feature-vector pipeline, as before the DToC (building a twin then errors).
  enabled: true
  # future-state handling (only when enabled):
  #   simulate    -> project the customer forward under a policy (scenario what-ifs)
  #   placeholder -> represent only observed history + current (no projection)
  future_mode: simulate
  horizon: 6              # future steps to project when future_mode is "simulate"
  time_step_months: 1     # months advanced per projected step

# =============================================================================
# Gym environment (rl_nba.environment.gym_env) — for training with RL libraries
# (Stable-Baselines3, RLlib, ...). It reuses everything above (state, reward,
# dtoc journey features), so this block only sets the RL-loop shape.
# =============================================================================
gym:
  # mode = the flavour, or "none" to switch the Gym env off entirely:
  #   none    -> disabled; building CrossSellEnv raises GymDisabledError.
  #   rollout -> a batch of offers = one episode (truncated at steps_per_episode),
  #              a fresh customer each step. The shape most deep-RL trainers expect.
  #   bandit  -> one offer = one episode (terminated each step); the faithful
  #              contextual-bandit view.
  #   masked  -> like rollout, but eligibility is HARD-enforced (an illegal offer is
  #              remapped to a legal one). Pairs with sb3-contrib MaskablePPO.
  mode: rollout
  steps_per_episode: 256   # episode length for rollout / masked (ignored for bandit)
  # Eligibility (never re-offer an owned product) is always exposed as an action
  # mask (info["action_mask"] + action_masks() for MaskablePPO). This is only the
  # reward an UNMASKED agent gets for offering an owned product in the SOFT modes
  # (bandit / rollout); in masked mode the offer is remapped instead.
  illegal_reward: 0.0

# =============================================================================
# Population panel environment (rl_nba.environment.population) — the 48-month
# SEQUENTIAL simulation. Steps the whole customer base forward one month at a
# time, optimising long-term cumulative value. Every rate/weight is a knob; the
# exact reward formula is still being researched, so these are placeholders.
# =============================================================================
population:
  # horizon (customer count = the whole pool, set by synthetic.n_customers / real data)
  n_months: 48             # episode length (monthly cut-offs)
  seed: 7
  # capacity & governance (applied before ranking + execution each month)
  monthly_capacity: 500    # max offers executed per month (-1 = unlimited)
  consent_rate: 0.9        # fraction of customers who consent to contact
  contact_cooldown: 2      # months before a contacted customer may be contacted again
  operational_cost: 0.0    # cost charged per executed offer (agent / telesales resource)
  # long-term reward (issuance value minus lapse/surrender/complaint/operational costs)
  discount: 0.999          # per-month discount on the cumulative reward
  issuance_value: vnb      # value credited on issuance: conversion | revenue | ape | vnb
  lapse_penalty: 0.5       # fraction of a policy's value lost on lapse
  surrender_penalty: 0.8   # fraction of a policy's value lost on surrender
  complaint_cost: 100.0    # flat cost charged per complaint
  # monthly dynamics (hazards / drift)
  lapse_rate: 0.004        # monthly per-policy lapse hazard
  surrender_rate: 0.002    # monthly per-policy surrender hazard
  complaint_rate: 0.001    # baseline monthly complaint probability
  fatigue_penalty: 0.05    # extra complaint probability for customers contacted that month
  engagement_decay: 0.01   # monthly engagement decay
